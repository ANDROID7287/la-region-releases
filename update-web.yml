name: Update Website Links
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Website Repo
        uses: actions/checkout@v4
      
      - name: Get Latest Release Info
        id: get_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Change repo name if website is separate from releases
          REPO="ANDROID7287/la-region-releases"
          LATEST_TAG=$(gh release view --repo $REPO --json tagName -q '.tagName')
          EXE_URL=$(gh release view --repo $REPO --json assets -q '.assets[] | select(.name | endswith(".exe")) | .url' | head -n 1)
          
          echo "TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "URL=$EXE_URL" >> $GITHUB_ENV

      - name: Update index.html
        run: |
          # Replaces the href of the download button via placeholder if you prefer static links
          # However, script.js handles this dynamically. This is a backup for SEO.
          sed -i 's|PLACEHOLDER_URL|'${{ env.URL }}'|g' index.html
          sed -i 's|PLACEHOLDER_VERSION|'${{ env.TAG }}'|g' index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update release info to ${{ env.TAG }}" && git push)